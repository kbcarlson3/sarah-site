backend:
  name: git-gateway
  branch: main

media_folder: "public/images/products"
public_folder: "/images/products"

collections:
  - name: "products"
    label: "Products"
    folder: "src/content/products"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Product Image", name: "image", widget: "image" }
      - { label: "Amazon Link", name: "link", widget: "string" }
      - { label: "Date Added", name: "date", widget: "datetime" }
      - { label: "Display Order", name: "sortOrder", widget: "number", value_type: "int", default: 10, hint: "Lower numbers appear first" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Description (optional)", name: "body", widget: "markdown", required: false }
